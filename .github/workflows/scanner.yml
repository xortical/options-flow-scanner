name: Options Flow Scanner

on:
  schedule:
    - cron: "15 4 * * 1-5"   # 9:45 AM IST
    - cron: "30 6 * * 1-5"   # 12:00 PM IST
    - cron: "45 9 * * 1-5"   # 3:15 PM IST (best run — full day's flow)

  workflow_dispatch:
    inputs:
      expiry_min:
        description: "Min days to expiry"
        default: "1"
      expiry_max:
        description: "Max days to expiry"
        default: "90"
      min_score:
        description: "Minimum anomaly score (0-100)"
        default: "35"

jobs:
  scan:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Check NSE connectivity
        run: |
          echo "=== Testing NSE connectivity ==="
          curl -s -o /dev/null -w "nseindia.com HTTP status: %{http_code}\n" \
            -H "User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36" \
            -H "Accept: text/html,application/xhtml+xml" \
            --max-time 15 \
            "https://www.nseindia.com" || echo "nseindia.com unreachable"
          curl -s -o /dev/null -w "NSE API HTTP status: %{http_code}\n" \
            -H "User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36" \
            -H "Accept: application/json" \
            -H "Referer: https://www.nseindia.com/" \
            --max-time 15 \
            "https://www.nseindia.com/api/option-chain-indices?symbol=NIFTY" || echo "NSE API unreachable"
          echo "================================"

      - name: Run scanner
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          python scanner.py \
            --watchlist watchlist.txt \
            --output    reports \
            --min-score ${{ github.event.inputs.min_score || '35' }} \
            --expiry-days ${{ github.event.inputs.expiry_min || '1' }} ${{ github.event.inputs.expiry_max || '90' }}

      - name: Show report summary
        if: always()
        run: |
          echo "=== Report summary ==="
          if [ -f reports/latest.csv ]; then
            echo "Rows in CSV: $(wc -l < reports/latest.csv)"
            head -5 reports/latest.csv
          else
            echo "No CSV generated"
          fi

      - name: Commit reports
        if: always()
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add reports/latest.html reports/latest.csv 2>/dev/null || true
          git add reports/flow_*.html reports/flow_*.csv 2>/dev/null || true
          git diff --cached --quiet || git commit -m "📊 Flow report $(date -u '+%Y-%m-%d %H:%M') UTC"
          git push
